{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between
            align-items-center mb-4">

    <h1>
        Contacts
    </h1>

    <div>

        <a href="/contacts/upload/"
           class="btn btn-success">

            Upload CSV

        </a>

        <a href="/contacts/create/"
           class="btn btn-primary">

            Add Contact

        </a>

    </div>

</div>

<div class="card shadow-sm">

    <div class="card-body">

        <table class="table">

            <thead>

                <tr>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                {% for contact in object_list %}

                <tr>

                    <td>
                        {{ contact.name }}
                    </td>

                    <td>
                        {{ contact.email }}
                    </td>

                    <td>

                        {% if contact.is_subscribed %}

                        <span class="badge bg-success">
                            Active
                        </span>

                        {% else %}

                        <span class="badge bg-danger">
                            Unsubscribed
                        </span>

                        {% endif %}

                    </td>

                    <td>

                        <a href="/contacts/{{ contact.id }}/update/"
                           class="btn btn-sm btn-warning">

                            Edit

                        </a>

                        <a href="/contacts/{{ contact.id }}/delete/"
                           class="btn btn-sm btn-danger">

                            Delete

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
