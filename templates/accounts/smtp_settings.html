{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    SMTP Settings
</h1>

<div class="card shadow-sm">

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">

                Save SMTP Settings

            </button>

            <a href="/accounts/test-smtp/" class="btn btn-success">

                Send Test Email

            </a>

        </form>

    </div>

</div>

{% endblock %}
