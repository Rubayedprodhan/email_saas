{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between
            align-items-center mb-4">

    <h1>
        Media Library
    </h1>

    <a href="/campaigns/media/upload/"
       class="btn btn-primary">

        Upload Image

    </a>

</div>

<div class="row">

    {% for media in object_list %}

    <div class="col-md-3">

        <div class="card shadow-sm mb-4">

            <img src="{{ media.file.url }}"
                 class="card-img-top">

            <div class="card-body">

                <input type="text"
                       value="{{ media.file.url }}"
                       class="form-control">

            </div>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
