{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    Saved Sections
</h1>

<div class="row">

    {% for section in object_list %}

    <div class="col-md-6">

        <div class="card shadow-sm mb-4">

            <div class="card-body">

                <h5>
                    {{ section.name }}
                </h5>

                <hr>

                {{ section.content|safe }}

            </div>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
