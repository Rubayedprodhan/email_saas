{% extends 'base.html' %}

{% block content %}

<h1>Create Campaign</h1>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Save Campaign
    </button>
    <button type="button"
        id="optimize-btn"
        class="btn btn-sm btn-dark mt-2">

    Optimize Subject

</button>

</form>
<script>

document.getElementById(
    'optimize-btn'
).addEventListener(

    'click',

    function(){

        const subject = document.getElementById(
            'id_subject'
        ).value;

        fetch(

            '/campaigns/ai/optimize-subject/',

            {

                method:'POST',

                headers:{

                    'X-CSRFToken':
                    '{{ csrf_token }}',

                    'Content-Type':
                    'application/x-www-form-urlencoded'
                },

                body:
                `subject=${encodeURIComponent(subject)}`
            }

        )

        .then(response => response.json())

        .then(data => {

            document.getElementById(
                'optimized-result'
            ).innerHTML = `

                <div class="alert alert-success">

                    <strong>
                    AI Suggestion:
                    </strong>

                    <br>

                    ${data.optimized_subject}

                </div>
            `;
        });

    }
);

<div id="optimized-result"
     class="mt-3">

</div>

</script>
{% endblock %}
