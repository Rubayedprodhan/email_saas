{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    Add Email Block
</h1>

<div class="card shadow-sm">

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-primary">

                Save Block

            </button>

        </form>

    </div>

</div>

{% endblock %}
