{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between
            align-items-center mb-4">

    <h1>
        Email Templates
    </h1>
<a href="/campaigns/templates/import/"
   class="btn btn-dark">

    Import HTML

</a>
    <a href="/campaigns/templates/create/"
       class="btn btn-primary">

        Create Template

    </a>

</div>

<div class="row">

    {% for template in object_list %}

    <div class="col-md-6">

        <div class="card shadow-sm mb-4">

            <div class="card-body">

                <h4>
                    {{ template.name }}
                </h4>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
